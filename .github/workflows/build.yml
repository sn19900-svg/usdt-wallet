name: Build USDT Wallet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --rerun-tasks

      - name: Verify APK is signed
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          echo "Checking signature..."
          unzip -l "$APK_PATH" | grep -i "\.RSA\|\.SF\|\.DSA\|MANIFEST.MF" || echo "WARNING: No signature files found, will sign manually"

      - name: Restore persistent keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Manually sign APK with apksigner
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign"

          APK_IN="app/build/outputs/apk/debug/app-debug.apk"
          APK_ALIGNED="app/build/outputs/apk/debug/app-debug-aligned.apk"
          APK_OUT="app/build/outputs/apk/debug/app-debug-signed.apk"

          "$ZIPALIGN" -p -f 4 "$APK_IN" "$APK_ALIGNED"

          "$APKSIGNER" sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android123 \
            --ks-key-alias usdtwalletkey \
            --key-pass pass:android123 \
            --out "$APK_OUT" \
            "$APK_ALIGNED"

          "$APKSIGNER" verify "$APK_OUT" && echo "✅ APK signed and verified successfully"

          cp "$APK_OUT" app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
